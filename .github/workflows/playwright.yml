name: Playwright Sharded Tests + Allure Report

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: Sharded Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browsers
        run: npx playwright install --with-deps

      # IMPORTANT: isolate shard results
      - name: Set shard results folder
        run: mkdir -p allure-results-${{ matrix.shard }}

      - name: Run tests (sharded)
        run: npx playwright test --shard=${{ matrix.shard }}/3
        env:
          ALLURE_RESULTS_DIR: allure-results-${{ matrix.shard }}

      - name: Move results to standard folder
        if: always()
        run: |
          mkdir -p allure-results
          cp -r allure-results-${{ matrix.shard }}/* allure-results/ || true

      - name: Upload shard results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results-${{ matrix.shard }}

  report:
    name: Merge & Publish Report
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all shard results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: merged-results
          merge-multiple: false

      # CRITICAL: real safe merge step
      - name: Merge Allure Results Safely
        run: |
          mkdir -p allure-results
          find merged-results -type f -name "*.json" -exec cp {} allure-results/ \;

      - name: Verify merged results
        run: ls -R allure-results

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      - name: Generate report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

